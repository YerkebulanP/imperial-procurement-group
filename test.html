<div class="loss-calculator">
  <div class="calculator-left">
    <h1 class="calculator-title">Калькулятор потерь</h1>
    <p class="calculator-subtitle">Рассчитайте реальные потери от простоев техники</p>

    <div class="form-card">
      <div class="form-section-title">Данные техники</div>

      <div class="form-grid">
        <div class="input-row">
          <div class="input-icon">🚜</div>
          <div class="field">
            <label>Тип техники</label>
            <select>
              <option>Экскаватор Komatsu</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="calculator-right">
    <div class="results-header">
      <div class="results-title">Результат</div>
      <div class="results-badge">−20%</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Потери в месяц</div>
      <div class="metric-value">150 000</div>
      <div class="metric-sub">USD / месяц</div>
    </div>

    <div class="chart-card">
      <div class="chart-title">
        <h3>Динамика потерь</h3>
        <div class="chart-change">+20%</div>
      </div>

      <div class="chart-placeholder">Здесь chart.js / recharts график</div>
    </div>

    <button class="cta-button">Получить аудит техники</button>
  </div>
</div>
